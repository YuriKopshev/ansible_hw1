---
- name: Install ClickHouse
  hosts: clickhouse
  roles:
    - clickhouse

- name: Install Vector
  hosts: vector
  roles:
    - vector-role

- name: Install LightHouse
  hosts: lighthouse
  roles:
    - lighthouse-role
  tasks:
    - name: Check nginx is running
      become: true
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
